name: New attack pattern
description: Submit a new attack pattern or vulnerable MCP server you've discovered.
labels: ["attack-pattern", "good first issue"]
body:
  - type: input
    id: name
    attributes:
      label: Attack name
      placeholder: "Tool poisoning via Markdown comment"
    validations:
      required: true
  - type: dropdown
    id: class
    attributes:
      label: Attack class
      options:
        - credential_theft
        - tool_poisoning
        - indirect_prompt_injection
        - data_exfiltration
        - command_injection
        - privilege_escalation
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Minimal reproducer (tool description, config snippet, …)
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Source / credit
      placeholder: "https://twitter.com/..."
